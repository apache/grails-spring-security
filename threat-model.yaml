# False-friend properties.
false_friends:
  - id: secured_annotation_enforcement
    looks_like: "Method-level access control."
    actually_is: "Populates FilterSecurityInterceptor metadata; inert without the interceptor in the filter chain."
  - id: bindable_false_in_ui_domains
    looks_like: "Field-level access control."
    actually_is: "Plugin ships no bindable:false constraints; application must declare them."
  - id: useToken_on_s2ui_form
    looks_like: "CSRF protection on all UI forms."
    actually_is: "Only effective when action wraps body in withForm; register.gsp and resetPassword.gsp do not."
  - id: hideUserNotFoundExceptions
    looks_like: "Account-enumeration protection across the board."
    actually_is: "Only affects authentication exception type; /register/forgotPassword still enumerates."
  - id: cas_useSingleSignout
    looks_like: "Security feature."
    actually_is: "Security feature whose implementation disables session-fixation prevention globally."
  - id: excludeSpringSecurityAutoConfiguration_false
    looks_like: "Graceful fallback to Spring Boot defaults."
    actually_is: "Both stacks register with undefined precedence; documented as a footgun."
  - id: encrypted_jwt_with_default_rsa_key_provider
    looks_like: "Production-ready JWE."
    actually_is: "Ephemeral keys per JVM start; tokens unusable across restarts and pods."
  - id: rest_token_storage_jwt_algorithm_HS256
    looks_like: "Algorithm pin."
    actually_is: "Default for signing only; validation path branches on JWT type, not on this property."
  - id: ip_restrictions_behind_proxy
    looks_like: "Network-layer protection."
    actually_is: "Uses request.remoteAddr only; behind a proxy sees only the proxy address."
  - id: secureChannel_useHeaderCheckChannelSecurity
    looks_like: "Proxy-aware channel decision."
    actually_is: "Channel decision becomes proxy-aware, but PortResolverImpl still uses request.serverPort."
  - id: run_as_in_compat_shim
    looks_like: "HMAC-protected privilege substitution."
    actually_is: "Substituted token unsigned; key validated only on return path."
  - id: groovyAwareAclVoter
    looks_like: "ACL voter."
    actually_is: "Unconditionally grants access for Groovy meta-methods; intentional."
  - id: affirmativeBased_first_grant_wins
    looks_like: "Permissive-by-default authorization."
    actually_is: "Documented Spring Security 5.x semantics; one permissive voter overrides all denials."
  - id: spring_security_user_name_in_config
    looks_like: "Spring Boot convenience property."
    actually_is: "Creates {noop}-prefixed credential in production when componentBased.bridgeSpringSecurityUserProperties:true."
  - id: security_ui_encodePassword_false
    looks_like: "Behavior toggle."
    actually_is: "Default value stores cleartext passwords from UI flows."
  - id: AntPathRequestMatcher_no_normalization
    looks_like: "URL pattern matching."
    actually_is: "No `../` or URL-encoded normalization; relies on servlet container."

# §11a - recurring false positives that automated triage should suppress.
known_non_findings:
  - pattern: "Class.forName(name) in GormAclLookupStrategy line 298 driven by AclClass.className"
    discharged_by: "§6 trust assumption on ACL tables"
    disposition: "OUT-OF-MODEL: trusted-input"
  - pattern: "Class.forName(clientClass) in RestOauthService line 62 / grailsApplication.getClassForName(tokenClassName) in GormTokenStorageService"
    discharged_by: "§6 trust assumption on application.yml"
    disposition: "OUT-OF-MODEL: trusted-input"
  - pattern: "GroovyClassLoader.loadClass(className) in SpringSecurityUtils.mergeConfig"
    discharged_by: "§6 trust assumption on classpath config classes"
    disposition: "OUT-OF-MODEL: trusted-input"
  - pattern: "Groovy Closure execution in SecurityEventListener / ClosureVoter"
    discharged_by: "§6 trust assumption on application.groovy"
    disposition: "OUT-OF-MODEL: trusted-input"
    related: "BY-DESIGN: property-disclaimed if assumption violated"
  - pattern: "Dynamic property access user.\"$propertyName\" in GormUserDetailsService"
    discharged_by: "§6 trust assumption on securityConfig"
    disposition: "OUT-OF-MODEL: trusted-input"
  - pattern: "@PreAuthorize/@PostFilter SpEL evaluation with StandardEvaluationContext"
    discharged_by: "§6 trust assumption on annotation source"
    disposition: "OUT-OF-MODEL: trusted-input"
  - pattern: "AffirmativeBased first-grant-wins decision semantics"
    discharged_by: "§9 false-friend"
    disposition: "KNOWN-NON-FINDING"
  - pattern: "GroovyAwareAclVoter unconditional grant for Groovy meta-methods"
    discharged_by: "§9 false-friend"
    disposition: "KNOWN-NON-FINDING"
  - pattern: "AntPathRequestMatcher does not normalize ../ or URL-encoded segments"
    discharged_by: "§9 false-friend; container responsibility"
    disposition: "OUT-OF-MODEL: unsupported-component"
  - pattern: "Java deserialization in JwtService.deserialize"
    discharged_by: "§8 P10 signature verification; in-model only if alg=none reachable"
    disposition: "KNOWN-NON-FINDING"
  - pattern: "Java deserialization in RedisTokenStorageService / CustomSerializingTranscoder"
    discharged_by: "§5 environment assumption (network-isolated backend)"
    disposition: "OUT-OF-MODEL: trusted-input"
  - pattern: "Serializable plugin domain classes (PersistentLogin, RegistrationCode, User, Person, Role)"
    discharged_by: "§6 trust assumption on session store"
    disposition: "OUT-OF-MODEL: trusted-input"
  - pattern: "@Secured present but no in-method authz logic"
    discharged_by: "§4 (enforced by FilterSecurityInterceptor, not inline)"
    disposition: "KNOWN-NON-FINDING"
  - pattern: "MutableRoleHierarchy.setHierarchy(String) mutates at runtime"
    discharged_by: "§6 trust assumption on RoleHierarchyEntry table"
    disposition: "OUT-OF-MODEL: trusted-input"
