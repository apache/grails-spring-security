# Machine-readable companion to THREAT_MODEL.md (§15).
# THREAT_MODEL.md is canonical; regenerate this file whenever the prose
# document changes.

project:
  name: apache/grails-spring-security
  version_binding: "8.0.x"
  threat_model: THREAT_MODEL.md
  status: draft
  date: "2026-01"
  disclosure: SECURITY.md

# §2 - component families and their in/out-of-model disposition.
components:
  - name: core_authentication_authorization
    in_model: true
    representative_files:
      - plugin-core/plugin/src/main/groovy/grails/plugin/springsecurity/SpringSecurityCoreGrailsPlugin.groovy
      - plugin-core/plugin/src/main/groovy/grails/plugin/springsecurity/SpringSecurityUtils.groovy
      - plugin-core/plugin/src/main/groovy/grails/plugin/springsecurity/web/access/intercept/AbstractFilterInvocationDefinition.groovy
  - name: gorm_user_store
    in_model: true
    representative_files:
