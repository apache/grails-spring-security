# §5a - configuration knobs that change the security envelope.
config_knobs:
  - name: password.algorithm
    default: bcrypt
    security_relevant: true
    if_changed_to_noop_or_message_digest: OUT-OF-MODEL_non_default_build
    section: "§5a, §8 P1"
  - name: password.bcrypt.logrounds
    default: 10
    security_relevant: true
    maintainer_stance: "Resolved per §14 Q6: 10 is the supported production default; matches Spring Security upstream BCryptPasswordEncoder. Test environment uses 4 (DefaultSecurityConfig.groovy:193-207). §10 #1 recommends >=12 for hardening above the default."
    section: "§5a, §10 #1"
  - name: useSessionFixationPrevention
    default: true
    security_relevant: true
    if_disabled: OUT-OF-MODEL_non_default_build
    section: "§5a, §8 P2"
  - name: rejectIfNoRule
    default: true
    security_relevant: true
    if_disabled: OUT-OF-MODEL_non_default_build
    section: "§5a, §8 P3"
  - name: fii.rejectPublicInvocations
    default: true
    security_relevant: true
    notes: "Both rejectIfNoRule:false AND fii.rejectPublicInvocations:false silently passes uncovered URLs."
    section: "§5a"
  - name: excludeSpringSecurityAutoConfiguration
    default: true
    security_relevant: true
    if_disabled: OUT-OF-MODEL_non_default_build
    notes: "Documented as a footgun in README.md."
    section: "§5a, §11"
  - name: componentBased.bridgeSpringSecurityUserProperties
    default: true
    security_relevant: true
    maintainer_stance: "Resolved per §14 Q7: intentional; {noop} prefix mirrors Spring Boot's UserDetailsServiceAutoConfiguration. Default hard-coded true in SpringSecurityCoreGrailsPlugin.groovy:781. §11 misuse pattern (leftover dev credential in production) stands."
    notes: "Leftover spring.security.user.* config creates {noop}-prefixed credential in production."
    section: "§5a, §9 false-friend"
  - name: rememberMe.persistent
    default: false
    security_relevant: true
    notes: "When false, MD5-HMAC TokenBasedRememberMeServices is used."
    section: "§5a"
  - name: cacheUsers
    default: false
    security_relevant: true
    notes: "Account lock/disable changes bypassed until cache eviction; documented."
    section: "§5a"
  - name: secureChannel.useHeaderCheckChannelSecurity
    default: false
    security_relevant: true
    maintainer_stance: "Resolved per §14 Q9: asymmetry confirmed. SecurityRequestHolderFilter:83-113 makes the channel DECISION proxy-aware via X-Forwarded-Proto; PortResolverImpl:31-33 returns raw request.serverPort so redirect URL CONSTRUCTION is not proxy-aware. Operators must rely on the proxy to rewrite the Location header when a redirect fires."
    notes: "Even when true, PortResolverImpl does not consult X-Forwarded-Port."
    section: "§5a, §9"
  - name: ipRestrictions
    default: empty
    security_relevant: true
    maintainer_stance: "Resolved per §14 Q8: BY-DESIGN. IpAddressFilter.groovy:109,130 uses request.remoteAddr only; reports of proxy bypass are BY-DESIGN: property-disclaimed."
    notes: "IpAddressFilter uses request.remoteAddr only; no X-Forwarded-For."
    section: "§5a, §9"
  - name: useSecurityEventListener
    default: false
    security_relevant: true
    notes: "Groovy Closure execution from application.groovy."
    section: "§5a"
  - name: useRunAs
    default: false
    security_relevant: true
    maintainer_stance: "Resolved per §14 Q15: KNOWN-NON-FINDING. Compat shim's RunAsImplAuthenticationProvider is MORE permissive than upstream Spring Security 5.x - the key field is declared in both RunAsManagerImpl and RunAsImplAuthenticationProvider but never read (upstream performs a keyHash equality check; the shim does not). Default useRunAs:false keeps this opt-in. Follow-up F8 considers porting the upstream hashCode guard."
    notes: "RunAsImplAuthenticationProvider.authenticate() is pass-through; supports() returns true unconditionally."
    section: "§5a, §9 false-friend, §11a"
  - name: ldap.context.server
    default: ldap://localhost:389
    security_relevant: true
    notes: "Plaintext by default; must change to ldaps:// in production."
    section: "§5a, §9"
  - name: ldap.authenticator.useBind
    default: true
    security_relevant: true
    section: "§5a, §8 P8"
  - name: ldap.context.referral
    default: null
    security_relevant: true
    notes: "'follow' chases referrals to arbitrary servers."
    section: "§5a, §11"
  - name: cas.useSingleSignout
    default: true
    security_relevant: true
    maintainer_stance: "Resolved per §14 Q4: BY-DESIGN. DefaultCasSecurityConfig.groovy:33 default is true; SpringSecurityCasGrailsPlugin.groovy:85-89 forces useSessionFixationPrevention=false with explicit source comment. Reports against this trade-off are BY-DESIGN: property-disclaimed. Follow-up F2 adds the doc note to plugin-cas configuration.adoc."
    notes: "Forces useSessionFixationPrevention = false globally."
    section: "§5a, §9 false-friend, §11"
  - name: cas.key
    default: grails-spring-security-cas
    security_relevant: true
    notes: "Default value is shipped in source; MUST change for production."
    section: "§5a, §10 #3"
  - name: cas.proxyCallbackUrl
    default: null
    security_relevant: true
    notes: "When set, exposes PGT receptor endpoint."
    section: "§5a"
  - name: oauth2.providers.{name}.debug
    default: false
    security_relevant: true
    notes: "When true, raw OAuth traffic including tokens is logged."
    section: "§5a, §11"
  - name: oauth2.registration.roleNames
    default: ["ROLE_USER"]
    security_relevant: true
    notes: "Granted to every OAuth2-authenticated user regardless of provider claims."
    section: "§5a, §10 #10"
  - name: oauth2_state_generation
    default: "java.util.Random over 999_999 space"
    security_relevant: true
    maintainer_stance: "Resolved per §14 Q10: VALID-HARDENING. OAuth2AbstractProviderService.groovy:103 confirms `new Random().nextInt(999_999)`; zero SecureRandom usage in plugin-oauth2 tree. Follow-up F4 migrates to SecureRandom."
    notes: "Not cryptographically secure; state-CSRF feasible."
    section: "§5a, §9"
  - name: oauth2_pkce
    default: not_implemented
    security_relevant: true
    maintainer_stance: "Resolved per §14 Q11: VALID-HARDENING. OAuth2AbstractProviderService.buildScribeService (lines 115-128) does not invoke ServiceBuilder.withPkce(). Zero matches for withPkce/pkce/code_challenge/code_verifier in the plugin-oauth2 tree. Follow-up F5 adds PKCE."
    section: "§5a, §9"
  - name: rest.token.storage.jwt.secret
    default: null
    security_relevant: true
    maintainer_stance: "Resolved per §14 Q3: reachable misconfiguration when operator sets useSignedJwt:false (default is true) AND useEncryptedJwt:false (default) AND secret:null AND no key provider. JwtService.groovy:71-76 confirms PlainJWT acceptance in this state. Follow-up F1 adds startup-time rejection."
    notes: "Null + null key provider + useSignedJwt:false + useEncryptedJwt:false enables PlainJWT (alg=none) acceptance."
    section: "§5a, §8 P10, §9, §11"
  - name: rest.token.storage.jwt.algorithm
    default: HS256
    security_relevant: true
    maintainer_stance: "Resolved per §14 Q14: VALID-HARDENING. JwtService.parse() (lines 53-78) dispatches on Nimbus JWT Java type, never compares alg header to configured algorithm. Follow-up F7 adds algorithm allow-list pinning."
    notes: "No algorithm allow-list; any Nimbus-supported algorithm accepted."
    section: "§5a, §9"
  - name: rest.token.storage.jwt.refreshExpiration
    default: null
    security_relevant: true
    maintainer_stance: "Resolved per §14 Q12: BY-DESIGN; refresh token reused verbatim. RestOauthController.groovy:173-181 reassigns supplied refreshToken back onto the new AccessToken; none of the four storage backends (JWT/GORM/Redis/Memcached) invalidate the presented token on use. Operators implement RFC 6749 §10.4 rotation at the application layer. Follow-up F6 adds doc warning."
    notes: "Refresh tokens never expire by default."
    section: "§5a, §9, §10 #5"
  - name: rest.token.validation.active
    default: true
    security_relevant: true
    notes: "When false, validation filter is no-op."
    section: "§5a"
  - name: rest.login.useRequestParamsCredentials
    default: false
    security_relevant: true
    notes: "When true, credentials appear in URLs and logs."
    section: "§5a, §10 #17"
  - name: security.ui.encodePassword
    default: false
    security_relevant: true
    maintainer_stance: "Resolved per §14 Q5: keep false as default. DefaultUiSecurityConfig.groovy:23 sets default false; SpringSecurityUiService.groovy:810 confirms fallback. Flipping to true would double-hash passwords in s2-quickstart-generated applications (Person template has PasswordEncoderListener). Follow-up F3 adds startup WARN when encodePassword:false and no listener detected."
    notes: "When false, UI service stores submitted passwords without encoding. Operators using older Person template (no listener) MUST set true for production."
    section: "§5a, §10 #8, §11"
  - name: security.ui.register.requireEmailValidation
    default: "true"
    security_relevant: true
    notes: "When false, accounts activated immediately."
    section: "§5a"
  - name: security.ui.register.defaultRoleNames
    default: ["ROLE_USER"]
    security_relevant: true
    notes: "Roles granted on self-registration."
    section: "§5a, §10 #10"

# §6 - per-input trust.
entry_points:
  - surface: form_login
    parameter: j_username_j_password
    attacker_controllable: true
  - surface: basic_or_digest_auth
    parameter: Authorization_header
    attacker_controllable: true
  - surface: remember_me_cookie
    parameter: cookie_value
    attacker_controllable: true
  - surface: rest_login
    parameter: json_body
    attacker_controllable: true
  - surface: bearer_token
    parameter: Authorization_Bearer
    attacker_controllable: true
  - surface: oauth2_callback
    parameter: code_state_error
    attacker_controllable: true
  - surface: cas_callback
    parameter: ticket
    attacker_controllable: true
