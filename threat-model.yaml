# Machine-readable companion to THREAT_MODEL.md (§15).
# THREAT_MODEL.md is canonical; regenerate this file whenever the prose
# document changes.

project:
  name: apache/grails-spring-security
  version_binding: "8.0.x"
  threat_model: THREAT_MODEL.md
  status: draft_awaiting_pmc_review
  date: "2026-01"
  disclosure: SECURITY.md
  ratification_pr: "https://github.com/apache/grails-spring-security/pull/1224"

# §14 Ratification log - status of the 22 open questions originally collected in
# the draft. Each entry summarises the resolution; the canonical version with
# full evidence and code citations is in THREAT_MODEL.md §14.
ratification_log:
  wave_1:
    - id: Q1
      topic: caller_role_split
      resolution: confirmed_adopt_as_is
      summary: "Five roles in §2 are the correct primitives. Anonymous-token posture is a sub-state of unauthenticated; long-lived JWT M2M clients are a sub-state of authenticated low-privilege."
    - id: Q2
      topic: ui_plugin_endpoints_unprotected
      resolution: confirmed
      disposition_for_reports: "BY-DESIGN: property-disclaimed (when operator did not add a rule); VALID (when operator did configure protection)"
      evidence: "zero @Secured annotations across all 13 UI controllers; zero Requestmap rows in DefaultUiSecurityConfig.groovy; zero authz wiring in SpringSecurityUiGrailsPlugin"
    - id: Q3
      topic: jwt_alg_none_acceptance
      resolution: confirmed_reachable_misconfiguration
      disposition_for_reports: "OUT-OF-MODEL: non-default-build (requires explicit useSignedJwt:false); MODEL-GAP if a reachable configuration path is found that does not require operator opt-out"
      evidence: "JwtService.groovy:71-76 - PlainJWT branch only throws when jwtSecret OR keyProvider is truthy; checkJwtSecret guard is inside the useSignedJwt:true branch only"
      followup: F1
    - id: Q4
      topic: cas_useSingleSignout_session_fixation
      resolution: confirmed_by_design
      disposition_for_reports: "BY-DESIGN: property-disclaimed"
      evidence: "DefaultCasSecurityConfig.groovy:33 - useSingleSignout=true default; SpringSecurityCasGrailsPlugin.groovy:85-89 forces useSessionFixationPrevention=false with explicit source comment"
      followup: F2
    - id: Q5
      topic: ui_encodePassword_default_false
      resolution: keep_default_false
      reasoning: "s2-quickstart generates Person with PasswordEncoderListener that hashes on beforeInsert/beforeUpdate; flipping default would double-hash and break authentication silently"
      followup: F3
    - id: Q6
      topic: bcrypt_logrounds_production_default
      resolution: confirmed_10_is_production_default
      evidence: "DefaultSecurityConfig.groovy:193-207 - TEST=4, all other environments=10; matches Spring Security upstream BCryptPasswordEncoder default strength of 10"
      hardening_recommendation: "§10 #1 recommends >=12 above the default for sensitive deployments"
    - id: Q7
      topic: spring_security_user_bridge
      resolution: confirmed_intentional
      evidence: "SpringSecurityCoreGrailsPlugin.groovy:781 hard-codes default true; ComponentBasedConfigBlender.groovy:193-208 wires {noop}-prefixed InMemoryUserDetailsManager mirroring Spring Boot's UserDetailsServiceAutoConfiguration"
  wave_2:
    - id: Q8
      topic: ipAddressFilter_x_forwarded_for
      resolution: confirmed_by_design
      disposition_for_reports: "BY-DESIGN: property-disclaimed"
      evidence: "IpAddressFilter.groovy:109,130 uses request.remoteAddr only; IpAddressMatcher.matches(HttpServletRequest) internally calls request.getRemoteAddr(); zero X-Forwarded-For references in repo"
    - id: Q9
      topic: portResolverImpl_x_forwarded_port
      resolution: confirmed_by_design_with_asymmetry_note
      disposition_for_reports: "BY-DESIGN: property-disclaimed"
      evidence: "PortResolverImpl.groovy:31-33 returns request.serverPort; RetryWithHttps/HttpEntryPoint:39 build redirect URL via portResolver and request.serverName; SecurityRequestHolderFilter:83-113 makes channel DECISION proxy-aware but redirect URL CONSTRUCTION is not"
    - id: Q10
      topic: oauth2_state_javautilRandom
      resolution: valid_hardening
      evidence: "OAuth2AbstractProviderService.groovy:103 - new Random().nextInt(999_999); zero SecureRandom usage in plugin-oauth2 tree"
      followup: F4
    - id: Q11
      topic: oauth2_pkce_absent
      resolution: valid_hardening
      evidence: "OAuth2AbstractProviderService.buildScribeService (115-128) never invokes ServiceBuilder.withPkce(); zero withPkce/pkce/code_challenge/code_verifier matches"
      followup: F5
    - id: Q12
      topic: refresh_token_no_rotation
      resolution: confirmed_by_design
      disposition_for_reports: "BY-DESIGN: property-disclaimed"
      evidence: "RestOauthController.groovy:173-181 reassigns supplied refreshToken back onto new AccessToken; none of JWT/GORM/Redis/Memcached storage backends invalidate presented refresh token on use"
      followup: F6
    - id: Q13
      topic: jwt_logout_no_op
      resolution: confirmed_by_design
      disposition_for_reports: "BY-DESIGN: property-disclaimed (JWT backend); VALID only if stateful backend delete fails"
      evidence: "JwtTokenStorageService.groovy:124-128 throws TokenNotFoundException unconditionally; RestLogoutFilter.groovy:72-77 catches and sends HTTP 404; GORM/Redis/Memcached implement real removeToken"
    - id: Q14
      topic: jwt_algorithm_no_allow_list
      resolution: valid_hardening
      evidence: "JwtService.parse() (53-78) dispatches on Nimbus Java type (SignedJWT/EncryptedJWT/PlainJWT), never compares alg header to configured rest.token.storage.jwt.algorithm"
      followup: F7
  wave_3:
    - id: Q15
      topic: run_as_compat_shim_no_hmac
      resolution: known_non_finding_with_nuance
      disposition_for_reports: "KNOWN-NON-FINDING (when useRunAs=false default OR RUN_AS_* attribute is not injectable)"
      evidence: "RunAsManagerImpl.buildRunAs builds plain UsernamePasswordAuthenticationToken; key field never read in either RunAsManagerImpl or RunAsImplAuthenticationProvider"
      nuance: "Compat shim is MORE permissive than upstream Spring Security 5.x, which performs a keyHash equality check via hashCode(). Verified at upstream SHA 4942459 of spring-projects/spring-security."
      followup: F8
    - id: Q16
      topic: aclClass_className_operator_trusted
      resolution: confirmed_section6_trusted_input
      disposition_for_reports: "OUT-OF-MODEL: trusted-input (provided ACL administration endpoints are authorized)"
      evidence: "GormAclLookupStrategy.groovy:296-299 - Class.forName(className, true, contextClassLoader); className from AclClass.className DB column at line 259"
      nuance: "AclClassController (Q2) ships without @Secured, so the write path is unprotected unless operator adds Requestmap rule"
      followup: F9
    - id: Q17
      topic: gorm_serialization_user_person_role
      resolution: known_non_finding
      evidence: "Plugin does not ship User/Person/Role as source - generated from s2-quickstart templates. All 22 example domain classes implement Serializable with serialVersionUID=1L; no custom readObject/writeObject"
    - id: Q18
      topic: ajaxSearch_paramName_unvalidated
      resolution: valid_hardening
      evidence: "AbstractS2UiDomainController.groovy:189-210 - params.paramName drives GORM criterion property name AND is concatenated into raw HQL order-by string at doSearch:171 with only double-quote wrapping"
      followup: F10
    - id: Q19
      topic: section_13_dispositions_complete
      resolution: confirmed
  meta:
    - id: Q20
      topic: document_ownership
      resolution: confirmed
      summary: "Repo-root file, maintained by PMC, revised on §12 triggers; release branches fork with own version binding"
    - id: Q21
      topic: security_md_coexistence
      resolution: confirmed
      summary: "SECURITY.md is disclosure-process artifact; this document is the model. SECURITY.md already cross-references §3-§11a; no further change needed"
    - id: Q22
      topic: per_plugin_docs_coexistence
      resolution: confirmed
      summary: "Per-plugin AsciiDoc remains end-user-facing; threat model is triage-facing; Appendix A back-map enumerates the citations"

# Follow-up items identified during ratification - tracked as separate issues,
# not blocking on this document's ratification.
followup_items:
  - id: F1
    question: Q3
    location: SpringSecurityRestGrailsPlugin.groovy bean wiring
    action: "Reject startup when useSignedJwt=false AND useEncryptedJwt=false AND jwtSecret=null AND no keyProvider bean"
    severity: high
  - id: F2
    question: Q4
    location: plugin-cas/docs/src/docs/configuration.adoc
    action: "Add doc note linking useSingleSignout=true to forced useSessionFixationPrevention=false"
    severity: low_doc_only
  - id: F3
    question: Q5
    location: SpringSecurityUiService.initialize()
    action: "Emit startup WARN when encodePassword=false AND no PasswordEncoderListener-style hook detected on User class"
    severity: medium
  - id: F4
    question: Q10
    location: OAuth2AbstractProviderService.groovy:103
    action: "Replace new Random().nextInt(999_999) with SecureRandom full-int-range or UUID.randomUUID()"
    severity: medium
  - id: F5
    question: Q11
    location: OAuth2AbstractProviderService.buildScribeService (115-128)
    action: "Invoke ServiceBuilder.withPkce(); add per-provider usePkce config (default true)"
    severity: medium
  - id: F6
    question: Q12
    location: plugin-rest/docs/src/docs/tokenStorage.adoc
    action: "Add WARNING citing RFC 6749 §10.4 on refresh-token replay; point operators at refreshExpiration mitigation"
    severity: low_doc_only
  - id: F7
    question: Q14
    location: JwtService.parse() (53-78)
    action: "After JWTParser.parse(), compare jwt.header.algorithm to configured rest.token.storage.jwt.algorithm and throw JOSEException on mismatch"
    severity: medium
  - id: F8
    question: Q15
    location: RunAsImplAuthenticationProvider.groovy:32-39
    action: "Port upstream Spring Security 5.x keyHash equality check"
    severity: low
  - id: F9
    question: Q16
    location: GormAclLookupStrategy.lookupClass() (296-299)
    action: "Add allow-list or package-prefix check on className before Class.forName"
    severity: medium
  - id: F10
    question: Q18
    location: AbstractS2UiDomainController.ajaxSearch (189-210)
    action: "Validate paramName against classMappings[clazz] keys; validate params.order in ['asc','desc']"
    severity: medium

