plugins {
    id 'com.bertramlabs.asset-pipeline'
    id 'org.grails.grails-web'
    id 'org.grails.grails-gsp'
}

group = 'functional.test'

repositories {
    maven { url = 'https://repo.grails.org/grails/core' }
}

dependencies {

    implementation platform("org.grails:grails-bom:$grailsVersion")

    implementation project(':acl-plugin')
    implementation project(':core-plugin')
    implementation project(':ui-plugin')
    implementation 'org.grails:grails-core'
    implementation 'org.grails:grails-plugin-interceptors'
    implementation 'org.grails:grails-plugin-databinding'
    implementation 'org.grails:grails-plugin-rest' // Needed for respond method in controllers

    implementation "dumbster:dumbster:$dumbsterVersion", { transitive = false } // Uses javax
    implementation "org.grails.plugins:mail:$mailVersion"

    compileOnly 'org.slf4j:slf4j-nop' // Remove warning about missing slf4j implementation during gsp compilation

    runtimeOnly 'com.bertramlabs.plugins:asset-pipeline-grails'
    runtimeOnly 'com.h2database:h2'
    runtimeOnly 'com.zaxxer:HikariCP'
    runtimeOnly 'org.grails:grails-plugin-i18n'
    runtimeOnly 'org.grails:grails-plugin-services'
    runtimeOnly 'org.grails:grails-plugin-url-mappings'
    runtimeOnly 'org.grails.plugins:hibernate5'
    runtimeOnly 'org.fusesource.jansi:jansi'
    runtimeOnly 'org.springframework.boot:spring-boot-autoconfigure'
    runtimeOnly 'org.springframework.boot:spring-boot-starter-logging'
    runtimeOnly 'org.springframework.boot:spring-boot-starter-tomcat'

    testImplementation 'org.grails:grails-gorm-testing-support'
    testImplementation 'org.spockframework:spock-core'

    integrationTestImplementation "org.hibernate:hibernate-core-jakarta:$hibernateVersion" // Needed for access to SessionFactory
    integrationTestImplementation testFixtures('org.grails.plugins:geb')

    // Workaround for asset-pipeline bug
    integrationTestRuntimeOnly 'org.graalvm.js:js-community:24.1.2'
}

apply from: rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
apply from: rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
apply from: rootProject.layout.projectDirectory.file('gradle/examples-config.gradle')