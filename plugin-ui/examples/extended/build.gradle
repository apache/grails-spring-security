plugins {
    id 'com.bertramlabs.asset-pipeline'
    id 'org.apache.grails.gradle.grails-web'
    id 'org.apache.grails.gradle.grails-gsp'
}

group = 'functional.test'

dependencies {

    implementation platform("org.apache.grails:grails-bom:$grailsVersion")
    implementation project(':acl-plugin')
    implementation project(':core-plugin')
    implementation project(':ui-plugin')
    implementation 'org.apache.grails:grails-core'
    implementation 'org.apache.grails:grails-interceptors'
    implementation 'org.apache.grails:grails-databinding'
    implementation 'org.apache.grails:grails-rest-transforms' // Needed for respond method in controllers
    implementation 'org.apache.grails:grails-data-hibernate5'

    implementation "dumbster:dumbster:$dumbsterVersion", { transitive = false } // Uses javax
    implementation "org.grails.plugins:mail:$mailVersion"

    compileOnly 'org.slf4j:slf4j-nop' // Remove warning about missing slf4j implementation during gsp compilation

    runtimeOnly 'com.bertramlabs.plugins:asset-pipeline-grails'
    runtimeOnly 'com.h2database:h2'
    runtimeOnly 'com.zaxxer:HikariCP'
    runtimeOnly 'org.apache.grails:grails-i18n'
    runtimeOnly 'org.apache.grails:grails-services'
    runtimeOnly 'org.apache.grails:grails-url-mappings'
    runtimeOnly 'org.fusesource.jansi:jansi'
    runtimeOnly 'org.springframework.boot:spring-boot-autoconfigure'
    runtimeOnly 'org.springframework.boot:spring-boot-starter-logging'
    runtimeOnly 'org.springframework.boot:spring-boot-starter-tomcat'

    testImplementation 'org.apache.grails:grails-testing-support-datamapping'
    testImplementation 'org.spockframework:spock-core'

    integrationTestImplementation testFixtures('org.apache.grails:grails-geb')
}

assets.excludes = ['webjars/**']

apply {
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/groovydoc-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/examples-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/reproducible-config.gradle')
}