plugins {
    id 'java-library'
    id 'org.apache.grails.gradle.grails-plugin'
}

group = 'org.apache.grails'

ext {
    publishArtifactId = 'grails-spring-security-rest-grailscache'
    pomTitle = 'Grails Spring Security REST Plugin'
    pomDescription = 'Grails plugin to implement token-based, RESTful authentication using Spring Security'
    pomDevelopers = [
            alvarosanchez: 'Alvaro Sanchez-Mariscal',
            jameskleeh: 'James Kleeh',
            jdaugherty: 'James Daugherty'
    ]
}

dependencies {

    api 'org.apache.grails:grails-cache', {
        // api: GrailsCacheManager
    }
    api 'org.springframework:spring-context', {
        // api: Cache
    }
    api 'org.springframework.security:spring-security-core', {
        // api: UserDetails
    }

    implementation project(':core-plugin'), {
        // impl: SecurityFilterPosition, SpringSecurityUtils
    }
    implementation project(':spring-security-rest'), {
        // impl: SecureRandomTokenGenerator
    }
    implementation 'jakarta.annotation:jakarta.annotation-api', {
        // impl: @PostConstruct(runtime)
    }

    compileOnly 'org.apache.grails:grails-core' // Provided as this is a Grails plugin
    compileOnly 'org.apache.groovy:groovy' // Provided as this is a Grails plugin

    testImplementation 'org.spockframework:spock-core'
}

apply from: rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
apply from: rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
apply from: rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')