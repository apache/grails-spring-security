plugins {
    id 'groovy'
    id 'org.apache.grails.gradle.grails-profile'
}

group = 'org.apache.grails.profiles'

ext {
    publishArtifactId = 'spring-security-rest-testapp-profile'
    pomTitle = 'Grails Spring Security REST Test App Profile'
    pomDescription = 'A Grails profile to assist in generating various implementations of the Grails Spring Security REST plugin for testing purposes'
    pomDevelopers = [
            alvarosanchez: 'Alvaro Sanchez-Mariscal',
            jameskleeh: 'James Kleeh',
            jdaugherty: 'James Daugherty'
    ]
}

tasks.register('generateProfileConfig') {
    copy {
        from 'profile.yml.tmpl'
        into '.'
        rename { String fileName -> fileName.replaceAll '\\.tmpl', '' }
        expand(pluginVersion: project.version, grailsVersion: findProperty('grailsVersion'))
    }

    file('features').eachDir { feature ->
        copy {
            from "features/${feature.name}/feature.yml.tmpl"
            into "features/${feature.name}/"
            rename { String fileName -> fileName.replaceAll '\\.tmpl', '' }
            expand(pluginVersion: project.version, grailsVersion: findProperty('grailsVersion'))
        }
    }
}

dependencies {
    profileRuntimeApi "org.apache.grails.profiles:base:${findProperty('grailsVersion')}"
}

tasks.named('compileProfile') {
    dependsOn('generateProfileConfig')
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
}