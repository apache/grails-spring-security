plugins {
    id 'org.apache.grails.gradle.grails-profile'
}

group = 'org.apache.grails.profiles'

ext {
    publishArtifactId = 'spring-security-rest-testapp'
    pomTitle = 'Grails Spring Security REST Plugin'
    pomDescription = 'Grails plugin to implement token-based, RESTful authentication using Spring Security'
    pomDevelopers = [
            alvarosanchez: 'Alvaro Sanchez-Mariscal',
            jameskleeh: 'James Kleeh',
            jdaugherty: 'James Daugherty'
    ]
}

tasks.register('generateProfileConfig') {
    copy {
        from 'profile.yml.tmpl'
        into '.'
        rename { String fileName -> fileName.replaceAll '\\.tmpl', '' }
        expand pluginVersion: project.version
    }

    file('features').eachDir { feature ->
        copy {
            from "features/${feature.name}/feature.yml.tmpl"
            into "features/${feature.name}/"
            rename { String fileName -> fileName.replaceAll '\\.tmpl', '' }
            expand pluginVersion: project.version
        }
    }
}

tasks.named('compileProfile') {
    dependsOn('generateProfileConfig')
}

apply from: rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')