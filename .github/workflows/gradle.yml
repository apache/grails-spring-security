name: Java CI
on:
  push:
    branches:
      - '[4-9]+.[0-9]+.x'
  pull_request:
    branches:
      - '[4-9]+.[0-9]+.x'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['17', '21']
    env:
      WORKSPACE: ${{ github.workspace }}
      GRADLE_OPTS: -Xmx1500m -Dfile.encoding=UTF-8
    steps:
      - name: "📢 Print Dispatch Information"
        if: github.event_name == 'workflow_dispatch'
        env:
          DISPATCH_INFORMATION: ${{ github.event.inputs.message }}
        run: echo $DISPATCH_INFORMATION
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
      - name: "☕️ Setup JDK"
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: ${{ matrix.java }}
      - name: "🐘 Setup Gradle"
        uses: gradle/actions/setup-gradle@v4
        with:
          develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
      - name: "🏃 Run Tests"
        if: github.event_name == 'pull_request'
        id: tests
        run: ./gradlew check --continue
      - name: "🔨 Build project"
        if: github.event_name == 'push'
        id: build
        run: ./gradlew build --continue
      - name: "📤 Publish Snapshot"
        if: github.event_name == 'push' && steps.build.outcome == 'success' && matrix.java == '17'
        env:
          GRADLE_PUBLISH_RELEASE: 'false'
          MAVEN_PUBLISH_USERNAME: ${{ secrets.MAVEN_PUBLISH_USERNAME }}
          MAVEN_PUBLISH_PASSWORD: ${{ secrets.MAVEN_PUBLISH_PASSWORD }}
          MAVEN_PUBLISH_URL: ${{ secrets.MAVEN_PUBLISH_SNAPSHOT_URL }}
        run: ./gradlew publish
      - name: "✍️ Generate Documentation"
        id: docs
        if: success() && github.event_name == 'push' && matrix.java == '17'
        run: ./gradlew docs
      - name: "📤 Publish to Github Pages"
        if: github.event_name == 'push' && steps.publish.outcome == 'success' && matrix.java == '17'
        uses: grails/github-pages-deploy-action@grails
        env:
          BRANCH: gh-pages
          COMMIT_EMAIL: grails-build@users.noreply.github.com
          COMMIT_NAME: grails-build
          DOC_FOLDER: gh-pages
          FOLDER: build/docs
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
