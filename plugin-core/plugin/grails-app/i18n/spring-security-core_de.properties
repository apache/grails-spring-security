# Login errors
springSecurity.errors.login.expired=Die Gültigkeit ihres Zugangs ist leider abgelaufen.
springSecurity.errors.login.passwordExpired=Die Gültigkeit ihres Passwortes ist leider abgelaufen.
springSecurity.errors.login.disabled=Ihr Zugang wurde leider deaktiviert.
springSecurity.errors.login.locked=Ihr Zugang wurde leider gesperrt.
